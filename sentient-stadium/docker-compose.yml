version: '3.8'

services:
  backend:
    build: 
      context: ./backend
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - GEMINI_API_KEY=${GEMINI_API_KEY}

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:3000"
      - "3001:3001"
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://localhost:8080
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      - backend
